<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OmniChannel Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; width: 320px; padding: 16px; background: #fff; }
    h2   { font-size: 15px; margin-bottom: 2px; }
    .sub { font-size: 12px; color: #6b7280; margin-bottom: 12px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 8px 10px; }
    .card .label { font-size: 10px; color: #9ca3af; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 3px; }
    .card .value { font-size: 13px; color: #374151; }
    .section-title { font-size: 11px; font-weight: 600; color: #6b7280; margin: 12px 0 6px; text-transform: uppercase; letter-spacing: .04em; }
    .row  { display: flex; gap: 6px; margin-top: 6px; }
    .btn  { flex: 1; padding: 8px; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .btn-primary   { background: #2563eb; color: #fff; }
    .btn-primary:active   { background: #1d4ed8; }
    .btn-success   { background: #16a34a; color: #fff; }
    .btn-success:active   { background: #15803d; }
    .btn-secondary { background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; }
    .btn-secondary:active { background: #e5e7eb; }
    .btn:disabled  { opacity: .55; cursor: not-allowed; }
    textarea { width: 100%; height: 60px; font-size: 11px; font-family: monospace; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 4px; resize: vertical; color: #374151; margin-top: 6px; }
    .toast { font-size: 12px; color: #16a34a; margin-top: 8px; min-height: 16px; }
    .toast.error { color: #dc2626; }
    #syncSummary { font-size: 11px; color: #6b7280; }
  </style>
</head>
<body>
  <h2>OmniChannel Bridge</h2>
  <p class="sub">Relays inventory jobs to OTA platforms.</p>

  <div class="grid">
    <div class="card">
      <div class="label">Last Poll</div>
      <div class="value" id="lastPoll">—</div>
    </div>
    <div class="card">
      <div class="label">Jobs Processed</div>
      <div class="value" id="jobCount">0</div>
    </div>
    <div class="card">
      <div class="label">Last Sync</div>
      <div class="value" id="lastSync">—</div>
    </div>
    <div class="card">
      <div class="label">Sync Result</div>
      <div class="value" id="syncSummary">—</div>
    </div>
  </div>

  <div class="row">
    <button class="btn btn-success" id="syncBtn">Sync Today's Trips</button>
    <button class="btn btn-primary" id="pollBtn">Poll Jobs</button>
  </div>

  <div class="section-title">SeatOS Authentication</div>
  <div class="card" style="margin-bottom:6px">
    <div class="label">Token Source</div>
    <div class="value" id="jwtSource">Checking…</div>
  </div>
  <textarea id="jwtInput" placeholder="Paste JWT token manually (only if auto-detect fails)…"></textarea>
  <div class="row">
    <button class="btn btn-secondary" id="saveJwt">Save Token</button>
    <button class="btn btn-secondary" id="clearJwt">Clear</button>
  </div>
  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
